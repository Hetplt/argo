apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-argo
  namespace: default

spec:
  replicas: 3

  selector:
    matchLabels:
      app: nginx-argo

  template:
    metadata:
      labels:
        app: nginx-argo

    spec:
      containers:
        - name: nginx
          image: hetptl/nginx:v3

          ports:
            - containerPort: 80

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "256Mi"
